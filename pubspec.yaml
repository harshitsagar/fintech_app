name: fintech_app
description: "FinTech App with GetX and Clean Architecture"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI & Responsive
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  cached_network_image: ^3.4.1

  # State Management & Navigation
  get: ^4.7.3
  go_router: ^17.2.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  # Utilities
  intl: ^0.20.2
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  share_plus: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
